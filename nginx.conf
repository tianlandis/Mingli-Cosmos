# ============================================================
# 数字命理推演引擎 — Nginx 反向代理配置
# 核心优化：SSE 流式响应防卡顿（proxy_buffering off）
# 使用方式：复制到 /etc/nginx/sites-available/bazipaipan，
#          ln -s 到 sites-enabled，然后 nginx -t && nginx -s reload
# ============================================================

upstream bazipaipan_backend {
    server 127.0.0.1:3001;
    keepalive 64;                    # 保持长连接池
}

server {
    listen 80;
    # 替换为你的测试域名
    server_name bazi.example.com;

    # ── 日志 ──
    access_log /var/log/nginx/bazipaipan-access.log;
    error_log  /var/log/nginx/bazipaipan-error.log;

    # ── 请求体大小限制 ──
    client_max_body_size 10m;

    # ═══════════════════════════════════════
    # 全局路由：反向代理到 Hono 容器 (:3001)
    # ═══════════════════════════════════════
    location / {
        proxy_pass http://bazipaipan_backend;
        proxy_http_version 1.1;

        # ═══ 核心：SSE 流式响应防卡顿 ═══
        # 这三个参数是保证大模型打字机吐字丝滑的关键
        proxy_buffering off;                # 禁止 Nginx 缓冲后端响应
        proxy_cache off;                    # 禁止缓存
        chunked_transfer_encoding on;       # 启用分块传输编码

        # ── 长连接保持（防止 SSE 断连）──
        proxy_set_header Connection '';
        proxy_read_timeout 300s;            # SSE 连接最长 5 分钟
        proxy_send_timeout 300s;

        # ── 标准代理头 ──
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Gzip 压缩（静态资源，不影响 SSE）──
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;
        gzip_vary on;
    }

    # ═══════════════════════════════════════
    # 健康检查端点（监控用）
    # ═══════════════════════════════════════
    location /api/health {
        proxy_pass http://bazipaipan_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;                     # 健康检查不记日志
    }

    # ═══════════════════════════════════════
    # 安全加固
    # ═══════════════════════════════════════
    # 隐藏 Nginx 版本号
    server_tokens off;

    # 禁止通过 IP 直接访问（可选：生产环境建议开启）
    # if ($host !~ ^(bazi.example.com)$ ) {
    #     return 444;
    # }
}


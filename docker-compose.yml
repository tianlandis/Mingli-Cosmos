# ============================================================
# 数字命理推演引擎 — Docker Compose 生产编排
# ============================================================

services:
  bazipaipan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bazipaipan-prod
    ports:
      - "3001:3001"                          # 宿主机 3001 → 容器 3001
    volumes:
      # 动态挂载 .env：修改宿主机 .env 后只需 docker compose restart，无需重新构建镜像
      - ./.env:/app/.env:ro
      # 可选：挂载日志目录（如需持久化日志）
      # - ./logs:/app/logs
    restart: always                           # 容器异常退出 / 宿主机重启后自动恢复
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');http.get('http://localhost:3001/api/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
